###############################################################################
# GitHub Actions Workflow: Deploy Formula1 Lakehouse to Production
# 
# Despliega notebooks, job y dashboards desde DEV → PRD workspace
# Trigger: push a branch 'main' o manual (workflow_dispatch)
#
# Secrets requeridos en GitHub:
#   - DATABRICKS_DEV_HOST:  https://<dev-workspace>.azuredatabricks.net               DATABRICKS_ORIGIN_HOST
#   - DATABRICKS_DEV_TOKEN: Token del workspace DEV                                   DATABRICKS_ORIGIN_TOKEN
#   - DATABRICKS_PRD_HOST:  https://<prd-workspace>.azuredatabricks.net               DATABRICKS_DEST_HOST
#   - DATABRICKS_PRD_TOKEN: Token del workspace PRD (Service Principal recomendado)   DATABRICKS_DEST_TOKEN
#   - PRD_SQL_WAREHOUSE_ID: (Opcional) ID del SQL Warehouse en PRD para dashboards
###############################################################################

name: Deploy Formula1 Lakehouse to Production

on:
  push:
    branches:
      - main
    paths:
      - 'formula1-project/**'
  workflow_dispatch:
    inputs:
      deploy_dashboards:
        description: 'Deploy dashboards (true/false)'
        required: false
        default: 'true'

env:
  DEV_HOST: ${{ secrets.DATABRICKS_ORIGIN_HOST }}
  DEV_TOKEN: ${{ secrets.DATABRICKS_ORIGIN_TOKEN }}
  PRD_HOST: ${{ secrets.DATABRICKS_DEST_HOST }}
  PRD_TOKEN: ${{ secrets.DATABRICKS_DEST_TOKEN }}
  # Ruta base en DEV y PRD
  SOURCE_BASE: "/Workspace/Formula1_V2/F1_Project_v2/formula1-project"
  DEST_BASE: "/Workspace/Formula1_V2/F1_Project_v2/formula1-project"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Deploy Notebooks
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Export notebooks from DEV workspace
        run: |
          declare -a FOLDERS=("00-common" "01-setup" "02-bronze" "03-silver" "04-gold" "05-analytics")
          
          for folder in "${FOLDERS[@]}"; do
            echo "📂 Listing notebooks in $SOURCE_BASE/$folder..."
            
            # Usar --data-urlencode para manejar espacios en rutas
            RESPONSE=$(curl -s -G \
              -H "Authorization: Bearer $DEV_TOKEN" \
              --data-urlencode "path=$SOURCE_BASE/$folder" \
              "$DEV_HOST/api/2.0/workspace/list")
            
            # Extraer notebooks del listado
            echo "$RESPONSE" | jq -r '.objects[]? | select(.object_type=="NOTEBOOK") | .path' | while read nb_path; do
              nb_name=$(basename "$nb_path")
              mkdir -p "exported/$folder"
              
              echo "  ⬇️  Exporting: $nb_name"
              # Usar -G --data-urlencode para codificar correctamente rutas con espacios
              curl -s -G \
                -H "Authorization: Bearer $DEV_TOKEN" \
                --data-urlencode "path=$nb_path" \
                -d "format=SOURCE" \
                -d "direct_download=true" \
                --output "exported/$folder/$nb_name.py" \
                "$DEV_HOST/api/2.0/workspace/export"
            done
          done

      - name: Deploy notebooks to PRD workspace
        run: |
          declare -a FOLDERS=("00-common" "01-setup" "02-bronze" "03-silver" "04-gold" "05-analytics")
          
          for folder in "${FOLDERS[@]}"; do
            if [ ! -d "exported/$folder" ]; then
              echo "⚠️  No notebooks found in $folder, skipping..."
              continue
            fi
            
            # Crear carpeta destino
            echo "📁 Creating folder: $DEST_BASE/$folder"
            curl -s -X POST \
              -H "Authorization: Bearer $PRD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\":\"$DEST_BASE/$folder\"}" \
              "$PRD_HOST/api/2.0/workspace/mkdirs"
            
            for file in exported/$folder/*.py; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .py)
              dest_path="$DEST_BASE/$folder/$name"
              
              echo "  ⬆️  Importing: $name → $dest_path"
              curl -s -X POST \
                -H "Authorization: Bearer $PRD_TOKEN" \
                -H "Content-Type: multipart/form-data" \
                -F "path=$dest_path" \
                -F "format=SOURCE" \
                -F "language=PYTHON" \
                -F "overwrite=true" \
                -F "content=@$file" \
                "$PRD_HOST/api/2.0/workspace/import"
            done
          done

      - name: Cleanup exported files
        run: rm -rf exported

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy/Update Workflow Job
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-job:
    runs-on: ubuntu-latest
    needs: deploy-notebooks
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Check if job exists in PRD
        id: check_job
        run: |
          RESPONSE=$(curl -s -X GET \
            -H "Authorization: Bearer $PRD_TOKEN" \
            "$PRD_HOST/api/2.1/jobs/list?name=job_formula1_lakehouse_full_refresh")
          
          JOB_ID=$(echo "$RESPONSE" | jq -r '.jobs[0].job_id // empty')
          
          if [ -n "$JOB_ID" ]; then
            echo "job_exists=true" >> $GITHUB_OUTPUT
            echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT
            echo "✅ Job found in PRD with ID: $JOB_ID"
          else
            echo "job_exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Job does not exist in PRD, will create it"
          fi

      - name: Create or Update Job in PRD
        run: |
          JOB_SETTINGS=$(cat <<'EOF'
          {
            "name": "job_formula1_lakehouse_full_refresh",
            "job_clusters": [
              {
                "job_cluster_key": "Job_cluster",
                "new_cluster": {
                  "spark_version": "17.3.x-scala2.13",
                  "node_type_id": "Standard_D4ds_v4",
                  "num_workers": 0,
                  "spark_conf": {
                    "spark.databricks.cluster.profile": "singleNode",
                    "spark.master": "local[*, 4]"
                  },
                  "azure_attributes": {
                    "availability": "SPOT_WITH_FALLBACK_AZURE",
                    "first_on_demand": 1,
                    "spot_bid_max_price": -1
                  },
                  "custom_tags": {
                    "ResourceClass": "SingleNode"
                  },
                  "data_security_mode": "SINGLE_USER",
                  "enable_elastic_disk": true,
                  "spark_env_vars": {
                    "PYSPARK_PYTHON": "/databricks/python3/bin/python3"
                  }
                }
              }
            ],
            "tasks": [
              {
                "task_key": "01_ingest_circuits_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/01.Ingest Circuits File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "01_transform_circuits_data",
                "depends_on": [{"task_key": "01_ingest_circuits_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/01.Transform Circuits Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "02_ingest_races_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/02.Ingest Races File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "02_transform_races_data",
                "depends_on": [{"task_key": "02_ingest_races_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/02.Transform Races Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "03_ingest_constructors_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/03.Ingest Constructors File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "03_transform_constructors_data",
                "depends_on": [{"task_key": "03_ingest_constructors_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/03.Transform Constructors Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "04_ingest_drivers_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/04.Ingest Drivers File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "04_transform_drivers_data",
                "depends_on": [{"task_key": "04_ingest_drivers_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/04.Transform Drivers Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "05_ingest_results_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/05.Ingest Results File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "05_transform_results_data",
                "depends_on": [{"task_key": "05_ingest_results_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/05.Transform Results Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "06_ingest_sprint_file",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze/06.Ingest Sprints File",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "06_transform_sprints_data",
                "depends_on": [{"task_key": "06_ingest_sprint_file"}],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver/06.Transform Sprints Data",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "9_1_Build_Nationality_Region_Reference",
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold/91.Build Nationality Region Reference",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "01_Build_Races_dimension",
                "depends_on": [
                  {"task_key": "01_transform_circuits_data"},
                  {"task_key": "02_transform_races_data"}
                ],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold/01.Build Races Dimension",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "02_Build_Constructors_Dimension",
                "depends_on": [
                  {"task_key": "03_transform_constructors_data"},
                  {"task_key": "9_1_Build_Nationality_Region_Reference"}
                ],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold/02.Build Constructors Dimension",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "03_Build_Drivers_Dimension",
                "depends_on": [
                  {"task_key": "04_transform_drivers_data"},
                  {"task_key": "9_1_Build_Nationality_Region_Reference"}
                ],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold/03.Build Drivers Dimension",
                  "source": "WORKSPACE"
                }
              },
              {
                "task_key": "04_Build_Results_Fact",
                "depends_on": [
                  {"task_key": "05_transform_results_data"},
                  {"task_key": "06_transform_sprints_data"}
                ],
                "job_cluster_key": "Job_cluster",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold/04.Build Results Fact",
                  "source": "WORKSPACE"
                }
              }
            ],
            "max_concurrent_runs": 1,
            "format": "MULTI_TASK",
            "queue": {"enabled": true}
          }
          EOF
          )
          
          if [ "${{ steps.check_job.outputs.job_exists }}" == "true" ]; then
            JOB_ID=${{ steps.check_job.outputs.job_id }}
            echo "🔄 Updating existing job $JOB_ID..."
            
            UPDATE_PAYLOAD=$(echo "$JOB_SETTINGS" | jq --arg id "$JOB_ID" '{job_id: ($id | tonumber), new_settings: .}')
            
            curl -s -X POST \
              -H "Authorization: Bearer $PRD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$UPDATE_PAYLOAD" \
              "$PRD_HOST/api/2.1/jobs/reset"
            
            echo "✅ Job updated successfully"
          else
            echo "🆕 Creating new job..."
            
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer $PRD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$JOB_SETTINGS" \
              "$PRD_HOST/api/2.1/jobs/create")
            
            NEW_JOB_ID=$(echo "$RESPONSE" | jq -r '.job_id')
            echo "✅ Job created with ID: $NEW_JOB_ID"
          fi

  


