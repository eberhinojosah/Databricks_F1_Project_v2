###############################################################################
# GitHub Actions Workflow: Deploy Formula1 Lakehouse to Production
# 
# Despliega notebooks, job desde DEV → PRD workspace
# Trigger: push a branch 'main' o manual (workflow_dispatch)
#
# Secrets requeridos en GitHub:
#   - DATABRICKS_DEV_HOST:  https://<dev-workspace>.azuredatabricks.net               DATABRICKS_ORIGIN_HOST
#   - DATABRICKS_DEV_TOKEN: Token del workspace DEV                                   DATABRICKS_ORIGIN_TOKEN
#   - DATABRICKS_PRD_HOST:  https://<prd-workspace>.azuredatabricks.net               DATABRICKS_DEST_HOST
#   - DATABRICKS_PRD_TOKEN: Token del workspace PRD (Service Principal recomendado)   DATABRICKS_DEST_TOKEN
#   - PRD_SQL_WAREHOUSE_ID: (Opcional) ID del SQL Warehouse en PRD para dashboards
###############################################################################

name: Deploy Formula1 Lakehouse to Production

on:
  push:
    branches:
      - main
    paths:
      - 'formula1-project/**'

  workflow_dispatch:
    inputs:
      deploy_dashboards:
        description: 'Deploy dashboards (true/false)'
        required: false
        default: 'true'

env:
  DEV_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
  DEV_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}
  PRD_HOST: ${{ secrets.DATABRICKS_PRD_HOST }}
  PRD_TOKEN: ${{ secrets.DATABRICKS_PRD_TOKEN }}

  # Rutas de notebooks
  SOURCE_BASE: "/Workspace/Formula1_V2/F1_Project_v2/formula1-project"
  DEST_BASE: "/Workspace/Formula1_V2/F1_Project_v2/formula1-project"

  # Configuración workflow
  WORKFLOW_NAME: "WF_FORMULA1_PRD"
  CLUSTER_NAME: "cluster_SD"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────────────────────────
      # Checkout
      # ─────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────
      # Instalar dependencias
      # ─────────────────────────────────────────────────────────────
      - name: Install jq & curl
        run: sudo apt-get update && sudo apt-get install -y jq curl

      # ─────────────────────────────────────────────────────────────
      # Exportar notebooks desde DEV
      # ─────────────────────────────────────────────────────────────
      - name: Export notebooks from DEV workspace
        run: |
          declare -a FOLDERS=("00-common" "01-setup" "02-bronze" "03-silver" "04-gold" "05-analytics")

          mkdir -p exported

          for folder in "${FOLDERS[@]}"; do
            echo "📂 Listing notebooks in $SOURCE_BASE/$folder..."

            RESPONSE=$(curl -s -X GET \
              -H "Authorization: Bearer $DEV_TOKEN" \
              "$DEV_HOST/api/2.0/workspace/list?path=$SOURCE_BASE/$folder")

            echo "$RESPONSE" | jq -r '.objects[]? | select(.object_type=="NOTEBOOK") | .path' | while read nb_path; do

              nb_name=$(basename "$nb_path")
              mkdir -p "exported/$folder"

              echo "⬇️ Exportando: $nb_name"

              curl -s -X GET \
                -H "Authorization: Bearer $DEV_TOKEN" \
                "$DEV_HOST/api/2.0/workspace/export?path=$nb_path&format=SOURCE&direct_download=true" \
                --output "exported/$folder/$nb_name.py"
            done
          done

      # ─────────────────────────────────────────────────────────────
      # Deploy notebooks a PRD
      # ─────────────────────────────────────────────────────────────
      - name: Deploy notebooks to PRD workspace
        run: |
          declare -a FOLDERS=("00-common" "01-setup" "02-bronze" "03-silver" "04-gold" "05-analytics")

          for folder in "${FOLDERS[@]}"; do

            if [ ! -d "exported/$folder" ]; then
              echo "⚠️ No notebooks encontrados en $folder"
              continue
            fi

            echo "📁 Creando carpeta: $DEST_BASE/$folder"

            curl -s -X POST \
              -H "Authorization: Bearer $PRD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"path\":\"$DEST_BASE/$folder\"}" \
              "$PRD_HOST/api/2.0/workspace/mkdirs"

            for file in exported/$folder/*.py; do

              [ -f "$file" ] || continue

              name=$(basename "$file" .py)
              dest_path="$DEST_BASE/$folder/$name"

              echo "⬆️ Importando: $name"

              response=$(curl -s -X POST \
                -H "Authorization: Bearer $PRD_TOKEN" \
                -H "Content-Type: multipart/form-data" \
                -F "path=$dest_path" \
                -F "format=SOURCE" \
                -F "language=PYTHON" \
                -F "overwrite=true" \
                -F "content=@$file" \
                "$PRD_HOST/api/2.0/workspace/import")

              echo "Response: $response"
            done
          done

      # ─────────────────────────────────────────────────────────────
      # Verificar si existe workflow y eliminarlo
      # ─────────────────────────────────────────────────────────────
      - name: Check if workflow exists and delete if necessary
        run: |
          echo "🔍 Buscando workflow existente: $WORKFLOW_NAME"

          workflows_response=$(curl -s -X GET \
            -H "Authorization: Bearer $PRD_TOKEN" \
            "$PRD_HOST/api/2.1/jobs/list")

          existing_job_id=$(echo "$workflows_response" | jq -r --arg name "$WORKFLOW_NAME" '.jobs[]? | select(.settings.name == $name) | .job_id')

          if [ "$existing_job_id" != "" ] && [ "$existing_job_id" != "null" ]; then

            echo "🗑️ Eliminando workflow existente ID: $existing_job_id"

            delete_response=$(curl -s -X POST \
              -H "Authorization: Bearer $PRD_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"job_id\": $existing_job_id}" \
              "$PRD_HOST/api/2.1/jobs/delete")

            echo "Delete response: $delete_response"
          else
            echo "✅ No existe workflow previo"
          fi

      # ─────────────────────────────────────────────────────────────
      # Obtener cluster existente
      # ─────────────────────────────────────────────────────────────
      - name: Get existing cluster ID
        run: |
          echo "🔍 Buscando cluster: $CLUSTER_NAME"

          clusters_response=$(curl -s -X GET \
            -H "Authorization: Bearer $PRD_TOKEN" \
            "$PRD_HOST/api/2.0/clusters/list")

          cluster_id=$(echo "$clusters_response" | jq -r --arg name "$CLUSTER_NAME" '.clusters[]? | select(.cluster_name == $name) | .cluster_id')

          if [ "$cluster_id" != "" ] && [ "$cluster_id" != "null" ]; then

            echo "✅ Cluster encontrado: $cluster_id"
            echo "CLUSTER_ID=$cluster_id" >> $GITHUB_ENV

          else
            echo "❌ Cluster no encontrado"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────
      # Crear Workflow Databricks
      # ─────────────────────────────────────────────────────────────
      - name: Create Databricks Workflow
        run: |
          CLUSTER_ID="${{ env.CLUSTER_ID }}"

          echo "🚀 Creando workflow: $WORKFLOW_NAME"

          cat > workflow_config.json << EOF
          {
            "name": "WF_FORMULA1_PRD",
            "format": "MULTI_TASK",
            "tasks": [
              {
                "task_key": "bronze_layer",
                "description": "Ejecución Bronze Layer",
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/02-bronze",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 1
              },
              {
                "task_key": "silver_layer",
                "description": "Ejecución Silver Layer",
                "depends_on": [
                  {
                    "task_key": "bronze_layer"
                  }
                ],
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/03-silver",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 1
              },
              {
                "task_key": "gold_layer",
                "description": "Ejecución Gold Layer",
                "depends_on": [
                  {
                    "task_key": "silver_layer"
                  }
                ],
                "notebook_task": {
                  "notebook_path": "/Workspace/Formula1_V2/F1_Project_v2/formula1-project/04-gold",
                  "source": "WORKSPACE"
                },
                "existing_cluster_id": "$CLUSTER_ID",
                "timeout_seconds": 3600,
                "max_retries": 1
              }
            ],
            "schedule": {
              "quartz_cron_expression": "0 0 8 * * ?",
              "timezone_id": "America/Mexico_City",
              "pause_status": "PAUSED"
            },
            "max_concurrent_runs": 1,
            "tags": {
              "environment": "production",
              "project": "formula1_lakehouse",
              "created_by": "github_actions"
            }
          }
          EOF

          create_response=$(curl -s -X POST \
            -H "Authorization: Bearer $PRD_TOKEN" \
            -H "Content-Type: application/json" \
            -d @workflow_config.json \
            "$PRD_HOST/api/2.1/jobs/create")

          echo "Workflow creation response: $create_response"

          job_id=$(echo "$create_response" | jq -r '.job_id')

          if [ "$job_id" != "" ] && [ "$job_id" != "null" ]; then
            echo "✅ Workflow creado correctamente ID: $job_id"
          else
            echo "❌ Error creando workflow"
            exit 1
          fi
